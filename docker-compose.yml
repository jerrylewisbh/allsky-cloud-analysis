services:
  db:
    image: postgres:15-alpine
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - allsky_db_permanent:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  api:
    build: 
      context: .
      dockerfile: api/Dockerfile
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "8000:8000"
    dns:
      - 10.0.0.227
      - 8.8.8.8
    depends_on:
      - db

  grafana:
    image: grafana/grafana-oss:latest
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      - allsky_grafana_permanent:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning
    depends_on:
      - db

volumes:
  allsky_db_permanent:
    name: allsky_db_permanent
  allsky_grafana_permanent:
    name: allsky_grafana_permanent